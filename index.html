<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Study Planner</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4f46e5" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Digital Study Planner" />
    <meta property="og:description" content="Boost your productivity and master your classes with the Digital Study Planner. Track homework assignments, organize exams, schedule timetable classes, set study session milestones, and run smart focused Pomodoro sessions." />
    <meta property="og:image" content="/icons/icon-512.png" />
    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Digital Study Planner" />
    <meta name="twitter:description" content="Boost your productivity and master your classes with the Digital Study Planner." />
    <meta name="twitter:image" content="/icons/icon-192.png" />
    <!-- Microsoft Store / Windows Compatibility -->
    <meta name="application-name" content="Digital Study Planner" />
    <meta name="msapplication-TileColor" content="#0f172a" />
    <meta name="msapplication-TileImage" content="/icons/icon-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
  </body>
</html>
